<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Permission Prompt</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: #FAF9F6;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 48px;
  -webkit-font-smoothing: antialiased;
}
.scene { position: relative; width: 600px; }
.bg-window {
  background: #fafaf8;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 2px 24px rgba(0,0,0,0.06);
  filter: brightness(0.75) blur(1px);
  height: 360px;
}
.bg-title-bar {
  background: #f0efed;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.dot { width: 10px; height: 10px; border-radius: 50%; }
.dot.r { background: #ff5f57; }
.dot.y { background: #ffbd2e; }
.dot.g { background: #28c840; }
.modal {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 400px;
  background: white;
  border-radius: 14px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.18);
  overflow: hidden;
  padding: 28px;
}
.modal-icon {
  width: 44px; height: 44px;
  background: rgba(112,92,246,0.1);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  margin-bottom: 16px;
}
.modal h3 {
  font-size: 16px;
  font-weight: 600;
  color: #282828;
  margin-bottom: 8px;
}
.modal p {
  font-size: 13px;
  color: #888;
  line-height: 1.6;
  margin-bottom: 20px;
}
.action-detail {
  background: #f8f7f5;
  border: 1px solid #e5e4e2;
  border-radius: 8px;
  padding: 14px;
  margin-bottom: 20px;
}
.action-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}
.action-row:last-child { margin-bottom: 0; }
.action-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #b5b5b5;
  width: 60px;
}
.action-value {
  font-size: 12px;
  color: #414141;
  font-weight: 500;
}
.file-path {
  font-family: 'SF Mono', 'Consolas', monospace;
  font-size: 11px;
  color: #705CF6;
  background: rgba(112,92,246,0.06);
  padding: 2px 6px;
  border-radius: 3px;
}
.buttons {
  display: flex;
  gap: 8px;
}
.btn {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  text-align: center;
  border: none;
  cursor: default;
}
.btn-deny {
  background: #f4f3f0;
  color: #888;
}
.btn-once {
  background: #f4f3f0;
  color: #414141;
}
.btn-allow {
  background: #705CF6;
  color: white;
}
</style>
</head>
<body>
<div class="scene">
  <div class="bg-window">
    <div class="bg-title-bar">
      <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
    </div>
  </div>
  <div class="modal">
    <div class="modal-icon">📝</div>
    <h3>Claude wants to create a file</h3>
    <p>Claude is requesting permission to save a new file to your Proposals folder.</p>
    <div class="action-detail">
      <div class="action-row">
        <div class="action-label">Action</div>
        <div class="action-value">Create new file</div>
      </div>
      <div class="action-row">
        <div class="action-label">File</div>
        <div class="action-value"><span class="file-path">proposal-acme-v1.md</span></div>
      </div>
      <div class="action-row">
        <div class="action-label">Location</div>
        <div class="action-value"><span class="file-path">~/Business/Proposals/</span></div>
      </div>
    </div>
    <div class="buttons">
      <div class="btn btn-deny">Deny</div>
      <div class="btn btn-once">Allow Once</div>
      <div class="btn btn-allow">Allow</div>
    </div>
  </div>
</div>
</body>
</html>
