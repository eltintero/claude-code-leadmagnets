<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Twitter — Model Selection</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;background:#e0dfdd;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:48px}
.card{width:1080px;height:1080px;background:#282828;border-radius:0;display:flex;flex-direction:column;justify-content:center;padding:96px;position:relative;overflow:hidden}
.brand{position:absolute;top:48px;right:48px;font-size:12px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.3)}
.content{}
.line1{font-size:48px;font-weight:700;color:white;line-height:1.15;letter-spacing:-.02em;margin-bottom:40px}
.tier{font-size:26px;color:rgba(255,255,255,.6);line-height:1.6;margin-bottom:8px}
.tier strong{color:#C5EF48;font-weight:600}
.tier .label{color:white;font-weight:700}
.bottom{font-size:26px;color:rgba(255,255,255,.45);line-height:1.5;max-width:800px;margin-top:32px}
.footer{position:absolute;bottom:48px;left:96px;right:96px;display:flex;justify-content:space-between;font-size:14px;color:rgba(255,255,255,.25);font-weight:500}
.accent-line{width:48px;height:3px;background:#705CF6;margin-bottom:24px}
</style>
</head>
<body>
<div class="card">
  <div class="brand">LOW / CODE</div>
  <div class="content">
    <div class="accent-line"></div>
    <div class="line1">Don't use Claude Opus for everything.</div>
    <div class="tier"><span class="label">Haiku:</span> quick tasks. <strong>Cheapest.</strong></div>
    <div class="tier"><span class="label">Sonnet:</span> daily work. <strong>Best default.</strong></div>
    <div class="tier"><span class="label">Opus:</span> important stuff. <strong>Most capable.</strong></div>
    <div class="bottom">3 employees at different hourly rates. Assign work accordingly.</div>
  </div>
  <div class="footer">
    <span>@eltintero</span>
    <span>lowcode.agency</span>
  </div>
</div>
</body>
</html>
