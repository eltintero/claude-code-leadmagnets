<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Twitter — AI Is 10% of the Equation</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;background:#e0dfdd;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:48px}
.card{width:1080px;height:1080px;background:#FAF9F6;border-radius:0;display:flex;flex-direction:column;justify-content:center;padding:96px;position:relative;overflow:hidden}
.brand{position:absolute;top:48px;right:48px;font-size:12px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:#705CF6}
.content{display:flex;flex-direction:column;gap:0}
.big-line{font-size:72px;font-weight:800;color:#282828;line-height:1.1;letter-spacing:-.03em}
.big-line .accent{color:#705CF6}
.big-line .lime{color:#38327C}
.divider{width:64px;height:4px;background:#705CF6;margin:40px 0}
.sub-line{font-size:28px;color:#414141;line-height:1.5;max-width:750px}
.footer{position:absolute;bottom:48px;left:96px;right:96px;display:flex;justify-content:space-between;font-size:14px;color:#B5B5B5;font-weight:500}
</style>
</head>
<body>
<div class="card">
  <div class="brand">LOW / CODE</div>
  <div class="content">
    <div class="big-line">AI is <span class="accent">10%</span> of the equation.</div>
    <div class="big-line" style="margin-top:16px;">Documentation is <span class="lime">90%.</span></div>
    <div class="divider"></div>
    <div class="sub-line">The companies that fail with AI aren't bad at prompting. They're bad at documenting. The tool works fine. The foundation was never built.</div>
  </div>
  <div class="footer">
    <span>@eltintero</span>
    <span>lowcode.agency</span>
  </div>
</div>
</body>
</html>
