<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Twitter — Permission &amp; Safety</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;background:#e0dfdd;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:48px}
.card{width:1080px;height:1080px;background:#FAF9F6;border-radius:0;display:flex;flex-direction:column;justify-content:center;padding:96px;position:relative;overflow:hidden}
.brand{position:absolute;top:48px;right:48px;font-size:12px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:#705CF6}
.content{}
.line1{font-size:48px;font-weight:700;color:#282828;line-height:1.15;letter-spacing:-.02em;margin-bottom:32px}
.line2{font-size:28px;color:#414141;line-height:1.5;max-width:800px;margin-bottom:28px}
.line2 strong{color:#705CF6}
.list{font-size:26px;color:#555;line-height:1.7;max-width:800px;margin-bottom:28px;padding-left:8px}
.line3{font-size:28px;font-weight:600;color:#282828;line-height:1.5;max-width:700px}
.footer{position:absolute;bottom:48px;left:96px;right:96px;display:flex;justify-content:space-between;font-size:14px;color:#B5B5B5;font-weight:500}
.accent-line{width:48px;height:3px;background:#705CF6;margin-bottom:24px}
</style>
</head>
<body>
<div class="card">
  <div class="brand">LOW / CODE</div>
  <div class="content">
    <div class="accent-line"></div>
    <div class="line1">Is it safe to give AI access to business files?</div>
    <div class="line2">Claude Code works like a <strong>new employee</strong>:</div>
    <div class="list">
      - Supervised access first<br>
      - More autonomy as trust builds<br>
      - You approve every action
    </div>
    <div class="line3">Nothing happens behind your back.</div>
  </div>
  <div class="footer">
    <span>@eltintero</span>
    <span>lowcode.agency</span>
  </div>
</div>
</body>
</html>
