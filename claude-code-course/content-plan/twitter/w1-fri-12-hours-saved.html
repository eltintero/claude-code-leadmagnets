<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Twitter — 12 Hours Saved</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;background:#e0dfdd;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:48px}
.card{width:1080px;height:1080px;background:#282828;border-radius:0;display:flex;flex-direction:column;justify-content:center;padding:96px;position:relative;overflow:hidden}
.brand{position:absolute;top:48px;right:48px;font-size:12px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.3)}
.content{}
.line1{font-size:48px;font-weight:700;color:white;line-height:1.15;letter-spacing:-.02em;margin-bottom:48px}
.time-list{display:flex;flex-direction:column;gap:16px;margin-bottom:0}
.time-item{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid rgba(255,255,255,.08);padding-bottom:16px}
.time-task{font-size:24px;color:rgba(255,255,255,.75);font-weight:500}
.time-savings{font-size:24px;color:#C5EF48;font-weight:600;white-space:nowrap}
.footer{position:absolute;bottom:48px;left:96px;right:96px;display:flex;justify-content:space-between;font-size:14px;color:rgba(255,255,255,.25);font-weight:500}
.accent-line{width:48px;height:3px;background:#705CF6;margin-bottom:24px}
</style>
</head>
<body>
<div class="card">
  <div class="brand">LOW / CODE</div>
  <div class="content">
    <div class="accent-line"></div>
    <div class="line1">Claude Code saved me ~12 hours this week.</div>
    <div class="time-list">
      <div class="time-item">
        <span class="time-task">Proposal draft</span>
        <span class="time-savings">2.5 hrs &rarr; 3 min</span>
      </div>
      <div class="time-item">
        <span class="time-task">Slack catch-up</span>
        <span class="time-savings">45 min &rarr; 30 sec</span>
      </div>
      <div class="time-item">
        <span class="time-task">Email template</span>
        <span class="time-savings">2 hrs &rarr; 1 min</span>
      </div>
      <div class="time-item">
        <span class="time-task">Brand voice guide</span>
        <span class="time-savings">3 hrs &rarr; 45 sec</span>
      </div>
      <div class="time-item" style="border-bottom:none;padding-bottom:0">
        <span class="time-task">Weekly content</span>
        <span class="time-savings">3 hrs &rarr; 5 min</span>
      </div>
    </div>
  </div>
  <div class="footer">
    <span>@eltintero</span>
    <span>lowcode.agency</span>
  </div>
</div>
</body>
</html>
