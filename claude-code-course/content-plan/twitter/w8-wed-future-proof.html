<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Twitter — Future Proof</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;background:#e0dfdd;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:48px}
.card{width:1080px;height:1080px;background:#282828;border-radius:0;display:flex;flex-direction:column;justify-content:center;padding:96px;position:relative;overflow:hidden}
.brand{position:absolute;top:48px;right:48px;font-size:12px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.3)}
.content{}
.line1{font-size:44px;font-weight:700;color:white;line-height:1.15;letter-spacing:-.02em;margin-bottom:32px}
.line1 strong{color:#C5EF48}
.line2{font-size:28px;color:rgba(255,255,255,.6);line-height:1.5;max-width:800px;margin-bottom:32px}
.line3{font-size:28px;color:rgba(255,255,255,.45);line-height:1.5;max-width:800px}
.line3 strong{color:#705CF6}
.footer{position:absolute;bottom:48px;left:96px;right:96px;display:flex;justify-content:space-between;font-size:14px;color:rgba(255,255,255,.25);font-weight:500}
.accent-line{width:48px;height:3px;background:#705CF6;margin-bottom:24px}
</style>
</head>
<body>
<div class="card">
  <div class="brand">LOW / CODE</div>
  <div class="content">
    <div class="accent-line"></div>
    <div class="line1">The 14-Document Foundation we build for clients <strong>isn't Claude-specific</strong>.</div>
    <div class="line2">It works with ChatGPT, Gemini, Copilot, and whatever comes next.</div>
    <div class="line3">Build it once. Every new AI tool starts at <strong>Level 3 on day one</strong>.</div>
  </div>
  <div class="footer">
    <span>@eltintero</span>
    <span>lowcode.agency</span>
  </div>
</div>
</body>
</html>
